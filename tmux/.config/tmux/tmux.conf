# Enable true color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
# set -ag terminal-overrides ",xterm-256color:RGB"
# undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# support colors for undercurl
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g prefix C-Space

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1

# Navigation using homerow ala nvim
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# set-option -g status-position top

# Shortcuts for creating panes
# bind-key v split-window -h
# bind-key h split-window -v

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# set -g status-style 'bg=terminal'

# Catppuccin theme
set -g @catppuccin_flavor "macchiato"

# Use custom window style to explicitly set separators
set -g @catppuccin_window_status_style "custom"
set -g @catppuccin_window_left_separator " "
set -g @catppuccin_window_middle_separator " "
set -g @catppuccin_window_right_separator " "

# Explicitly set current window separators (otherwise they may inherit rounded style)
set -g @catppuccin_window_current_left_separator " "
set -g @catppuccin_window_current_middle_separator " "
set -g @catppuccin_window_current_right_separator " "

# Configure basic (non-rounded) separators for status modules
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_middle_separator " "
set -g @catppuccin_status_right_separator " "

# Window text configuration
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_date_time_text " %m-%d %H:%M"

# Customize status module icons
set -g @catppuccin_session_icon " "
set -g @catppuccin_date_time_icon " 󰃰"

# Status bar configuration
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

run ~/.config/tmux/plugins/tpm/tpm
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
